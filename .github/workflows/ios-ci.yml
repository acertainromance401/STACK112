name: iOS CI

on:
  pull_request:
    branches:
      - main
      - main--code
    paths:
      - code/ios/**
      - .github/workflows/ios-ci.yml
  push:
    branches:
      - main
      - main--code
    paths:
      - code/ios/**
      - .github/workflows/ios-ci.yml

permissions:
  contents: read

jobs:
  ios-build-test:
    name: iOS Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install xcodegen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd code/ios
          xcodegen generate

      - name: Resolve simulator destination
        id: sim
        run: |
          DEST_NAME=$(xcodebuild -showdestinations -project code/ios/AISYS.xcodeproj -scheme AISYSApp \
            | grep "platform:iOS Simulator" \
            | head -n 1 \
            | sed -E 's/.*name:([^,}]+).*/\1/' \
            | xargs)

          if [[ -z "$DEST_NAME" ]]; then
            echo "No available iOS Simulator destination found"
            exit 1
          fi

          echo "name=$DEST_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEST_NAME"

      - name: Build
        run: |
          xcodebuild build \
            -project code/ios/AISYS.xcodeproj \
            -scheme AISYSApp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project code/ios/AISYS.xcodeproj \
            -scheme AISYSApp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
