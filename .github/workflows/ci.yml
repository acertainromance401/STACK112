name: Automated Checks

on:
  pull_request:
    branches:
      - main
      - main--code
  push:
    branches:
      - main
      - main--code

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: code/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r code/backend/requirements.txt
          pip install ruff

      - name: Ruff check
        run: ruff check code/backend/app

  test:
    name: Test (Pytest or Smoke)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: code/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r code/backend/requirements.txt
          pip install pytest

      - name: Check tests directory
        id: tests-dir
        run: |
          if [ -d code/backend/tests ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.tests-dir.outputs.exists == 'true'
        run: pytest code/backend/tests/

      - name: Run smoke compile
        if: steps.tests-dir.outputs.exists != 'true'
        run: python -m compileall code/backend/app
