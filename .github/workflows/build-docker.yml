name: Build & Docker

on:
  pull_request:
    paths:
      - 'code/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-docker.yml'
  push:
    branches:
      - main
      - main--code
    paths:
      - 'code/backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-docker.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./code/backend
          push: false
          load: true
          tags: ai-sys-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm ai-sys-api:test python -m compileall app
